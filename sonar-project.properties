sonar.projectKey=UltimaPhoenix_dev-coach
sonar.organization=ultimaphoenix

sonar.projectName=devcoach

sonar.sources=src
sonar.tests=tests
sonar.test.inclusions=tests/**

# Coverage from Vitest (v8 → lcov)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Build output, vendored assets, the docs site, and tooling are not product source.
sonar.exclusions=dist/**,dist-mcpb/**,assets/**,website/**,coverage/**,mcpb/**,scripts/**

# views.ts is a server-rendered hono/html template. Nested ternaries (S3358) and nested
# template literals (S4624) are the idiomatic way to compose conditional markup — every
# `${cond ? html`…` : html`…`}` fragment is a nested template by construction — and page
# renderers are inherently high cognitive-complexity (S3776). Splitting the markup into
# dozens of micro-helpers would hurt readability, so scope these three maintainability
# rules to the template file only. All other source is still held to them.
sonar.issue.ignore.multicriteria=tmpl1,tmpl2,tmpl3,cli1
sonar.issue.ignore.multicriteria.tmpl1.ruleKey=typescript:S3358
sonar.issue.ignore.multicriteria.tmpl1.resourceKey=src/web/views.ts
sonar.issue.ignore.multicriteria.tmpl2.ruleKey=typescript:S4624
sonar.issue.ignore.multicriteria.tmpl2.resourceKey=src/web/views.ts
sonar.issue.ignore.multicriteria.tmpl3.ruleKey=typescript:S3776
sonar.issue.ignore.multicriteria.tmpl3.resourceKey=src/web/views.ts

# `devcoach backup <path>` / `restore <path>` write/read a destination the operator types on
# their own machine — there is no privilege boundary or sandbox to escape, so S8707 (validate a
# CLI-controlled path before filesystem use) is a false positive for this local CLI.
sonar.issue.ignore.multicriteria.cli1.ruleKey=tssecurity:S8707
sonar.issue.ignore.multicriteria.cli1.resourceKey=src/cli/commands.ts
