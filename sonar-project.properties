sonar.projectKey=UltimaPhoenix_dev-coach
sonar.organization=ultimaphoenix

sonar.projectName=devcoach
sonar.projectVersion=0.3.35

sonar.sources=src
sonar.tests=tests
sonar.python.version=3.12

# Jinja2 templates contain {{ }} / {% %} syntax inside <script> blocks that
# SonarCloud's JS analyzer cannot parse, producing spurious "Unexpected token" errors.
sonar.exclusions=src/devcoach/web/templates/**

sonar.python.coverage.reportPaths=coverage.xml
