name: ci

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ["24", "26"] # 24 = current LTS floor (node:sqlite); 26 = latest stable
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:cov
      - run: npm run build

  publish:
    needs: check
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance / OIDC trusted publishing (tokenless)
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm publish --provenance --access public

  release-mcpb:
    needs: check
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write # create/upload the GitHub Release asset
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm
      - run: npm ci
      - name: Configure signing certificate (real cert if secrets set, else self-signed)
        env:
          MCPB_CERT_PEM: ${{ secrets.MCPB_CERT }}
          MCPB_KEY_PEM: ${{ secrets.MCPB_KEY }}
        run: |
          if [ -n "$MCPB_CERT_PEM" ] && [ -n "$MCPB_KEY_PEM" ]; then
            printf '%s' "$MCPB_CERT_PEM" > "$RUNNER_TEMP/mcpb-cert.pem"
            printf '%s' "$MCPB_KEY_PEM"  > "$RUNNER_TEMP/mcpb-key.pem"
            echo "MCPB_CERT=$RUNNER_TEMP/mcpb-cert.pem" >> "$GITHUB_ENV"
            echo "MCPB_KEY=$RUNNER_TEMP/mcpb-key.pem"   >> "$GITHUB_ENV"
            echo "Signing with the provided code-signing certificate."
          else
            echo "No MCPB_CERT/MCPB_KEY secrets — self-signing (unverified publisher)."
          fi
      - run: npm run mcpb:sign
      - name: Attach the .mcpb to the GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist-mcpb/*.mcpb
