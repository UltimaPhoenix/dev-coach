<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}devcoach{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <link rel="stylesheet" href="/static/style.css" />
  {% block head %}{% endblock %}
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen font-mono">

  <nav class="bg-gray-900 border-b border-gray-800 px-6 py-3 flex items-center gap-6">
    <span class="text-indigo-400 font-bold text-lg">🎓 devcoach</span>
    <a href="/" class="text-gray-300 hover:text-white transition {% if request.url.path == '/' %}text-white font-semibold{% endif %}">Profile</a>
    <a href="/lessons" class="text-gray-300 hover:text-white transition {% if '/lessons' in request.url.path %}text-white font-semibold{% endif %}">Lessons</a>
    <a href="/settings" class="text-gray-300 hover:text-white transition {% if request.url.path == '/settings' %}text-white font-semibold{% endif %}">Settings</a>
  </nav>

  <main class="max-w-5xl mx-auto px-6 py-8">
    {% block content %}{% endblock %}
  </main>

  {% block scripts %}{% endblock %}
</body>
</html>
