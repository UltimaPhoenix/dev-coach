{% extends "base.html" %}
{% block title %}Settings — devcoach{% endblock %}

{% block content %}
<h1 class="text-2xl font-bold mb-6 text-indigo-400">Settings</h1>

<form method="post" action="/settings" class="max-w-sm">
  <div class="bg-gray-900 border border-gray-800 rounded-xl p-6 space-y-5">

    <div>
      <label class="block text-sm text-gray-400 mb-1">Max lessons per day</label>
      <input
        type="number" name="max_per_day" min="1" max="20"
        value="{{ settings.max_per_day }}"
        class="w-full bg-gray-800 border border-gray-700 text-white rounded px-3 py-2 text-sm focus:outline-none focus:border-indigo-500"
      />
      <p class="text-xs text-gray-500 mt-1">How many lessons can be delivered in a 24-hour window.</p>
    </div>

    <div>
      <label class="block text-sm text-gray-400 mb-1">Minimum hours between lessons</label>
      <input
        type="number" name="min_hours_between" min="0" max="72"
        value="{{ settings.min_hours_between }}"
        class="w-full bg-gray-800 border border-gray-700 text-white rounded px-3 py-2 text-sm focus:outline-none focus:border-indigo-500"
      />
      <p class="text-xs text-gray-500 mt-1">Minimum gap between consecutive lessons.</p>
    </div>

    <button
      type="submit"
      class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold rounded px-4 py-2 text-sm transition"
    >
      Save settings
    </button>

  </div>
</form>
{% endblock %}
